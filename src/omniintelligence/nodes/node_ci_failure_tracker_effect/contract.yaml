---
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version:
  major: 1
  minor: 0
  patch: 0
name: "node_ci_failure_tracker_effect"
node_type: "EFFECT_GENERIC"
description: |
  Effect node that consumes CI failure events, increments failure streaks,
  logs CI failure events, and creates TriggerRecords when streak threshold
  is crossed. All DB I/O goes through ProtocolDebugStore.

  Security: This node handles webhook payloads from self-hosted runners.
  Runner tokens are scoped to repositories and must not be logged.

input_model:
  name: "ModelCiFailureDetectedV1"
  module: "omniintelligence.nodes.node_ci_failure_tracker_effect.models.model_events"
  description: "Payload for ci-failure-detected.v1 event."

output_model:
  name: "ModelDebugTriggerRecordCreatedV1"
  module: "omniintelligence.nodes.node_ci_failure_tracker_effect.models.model_events"
  description: "Payload emitted when a debug trigger record is created."

event_bus:
  event_bus_enabled: true
  subscribe_topics:
    - "onex.cmd.omniintelligence.ci-failure-detected.v1"
  publish_topics:
    - "onex.evt.omniintelligence.debug-trigger-record-created.v1"

dependencies:
  - name: debug_store
    type: protocol
    class_name: "ProtocolDebugStore"
    required: true
